name: 'Git Vibe Check'
description: 'Analyze your codebase vibe and post emoji-based health report'
branding:
  icon: 'activity'
  color: 'purple'

inputs:
  period:
    description: 'Analysis period (e.g., 3m, 6m, 1y)'
    required: false
    default: '6m'
  post-comment:
    description: 'Post result as PR comment (true/false)'
    required: false
    default: 'true'

runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.period }}
    - ${{ inputs.post-comment }}
